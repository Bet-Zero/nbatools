<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>nbatools</title>
    <style>
      :root {
        --bg: #0f1117;
        --surface: #181b24;
        --border: #2a2d38;
        --text: #e0e0e6;
        --muted: #8b8fa3;
        --accent: #4a90d9;
        --accent-hover: #5da1ea;
        --ok: #4caf50;
        --warn: #f5a623;
        --err: #e74c3c;
        --radius: 6px;
        --font:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --mono: "SF Mono", "Fira Code", "Consolas", monospace;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        min-height: 100vh;
      }
      .container {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px 16px;
      }

      /* Header */
      header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
      }
      header h1 {
        font-size: 1.4rem;
        font-weight: 600;
      }
      header .version {
        color: var(--muted);
        font-size: 0.8rem;
      }

      /* Query bar */
      .query-bar {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }
      .query-bar input {
        flex: 1;
        padding: 10px 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-size: 0.95rem;
        font-family: var(--font);
        outline: none;
        transition: border-color 0.15s;
      }
      .query-bar input:focus {
        border-color: var(--accent);
      }
      .query-bar input::placeholder {
        color: var(--muted);
      }
      .query-bar button {
        padding: 10px 20px;
        border: none;
        background: var(--accent);
        color: #fff;
        border-radius: var(--radius);
        font-size: 0.95rem;
        cursor: pointer;
        font-weight: 500;
        transition: background 0.15s;
        white-space: nowrap;
      }
      .query-bar button:hover {
        background: var(--accent-hover);
      }
      .query-bar button:disabled {
        opacity: 0.5;
        cursor: wait;
      }

      /* Sample queries */
      .samples {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 20px;
      }
      .samples button {
        padding: 4px 10px;
        font-size: 0.78rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        color: var(--muted);
        cursor: pointer;
        font-family: var(--font);
        transition: all 0.15s;
      }
      .samples button:hover {
        color: var(--text);
        border-color: var(--accent);
      }

      /* Loading */
      .loading {
        text-align: center;
        padding: 32px;
        color: var(--muted);
        display: none;
      }
      .loading.active {
        display: block;
      }
      .spinner {
        display: inline-block;
        width: 24px;
        height: 24px;
        border: 3px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 8px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Error */
      .error-box {
        background: rgba(231, 76, 60, 0.1);
        border: 1px solid var(--err);
        border-radius: var(--radius);
        padding: 12px 16px;
        margin-bottom: 16px;
        display: none;
      }
      .error-box.active {
        display: block;
      }
      .error-box .title {
        color: var(--err);
        font-weight: 600;
        margin-bottom: 4px;
      }

      /* Result area */
      #result-area {
        display: none;
      }
      #result-area.active {
        display: block;
      }

      /* Envelope metadata */
      .envelope {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 16px;
        margin-bottom: 16px;
        font-size: 0.85rem;
      }
      .envelope-row {
        display: flex;
        gap: 8px;
        margin-bottom: 4px;
        align-items: baseline;
      }
      .envelope-row:last-child {
        margin-bottom: 0;
      }
      .envelope-label {
        color: var(--muted);
        min-width: 110px;
        flex-shrink: 0;
      }
      .envelope-value {
        color: var(--text);
      }
      .status-ok {
        color: var(--ok);
        font-weight: 600;
      }
      .status-warn {
        color: var(--warn);
        font-weight: 600;
      }
      .status-err {
        color: var(--err);
        font-weight: 600;
      }
      .pill {
        display: inline-block;
        padding: 1px 8px;
        border-radius: 10px;
        font-size: 0.75rem;
        font-weight: 500;
        background: rgba(74, 144, 217, 0.15);
        color: var(--accent);
      }
      .notes-list {
        list-style: none;
      }
      .notes-list li {
        color: var(--muted);
      }
      .notes-list li::before {
        content: "• ";
        color: var(--accent);
      }
      .caveats-list li::before {
        color: var(--warn);
      }

      /* Result sections + tables */
      .section {
        margin-bottom: 16px;
      }
      .section-title {
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        margin-bottom: 8px;
        padding-bottom: 4px;
        border-bottom: 1px solid var(--border);
      }
      .data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.82rem;
        font-family: var(--mono);
        background: var(--surface);
        border-radius: var(--radius);
        overflow: hidden;
      }
      .data-table th {
        text-align: left;
        padding: 8px 10px;
        background: rgba(74, 144, 217, 0.08);
        color: var(--accent);
        font-weight: 600;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .data-table td {
        padding: 6px 10px;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
      }
      .data-table tr:last-child td {
        border-bottom: none;
      }
      .data-table tr:hover td {
        background: rgba(255, 255, 255, 0.02);
      }
      .data-table .num {
        text-align: right;
      }

      /* No-result message */
      .no-result {
        text-align: center;
        padding: 24px;
        color: var(--muted);
        background: var(--surface);
        border-radius: var(--radius);
        border: 1px solid var(--border);
      }

      /* Raw JSON toggle */
      .raw-toggle {
        margin-top: 16px;
        border-top: 1px solid var(--border);
        padding-top: 12px;
      }
      .toggle-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        padding: 5px 12px;
        font-size: 0.78rem;
        border-radius: var(--radius);
        cursor: pointer;
        font-family: var(--font);
        transition: all 0.15s;
      }
      .toggle-btn:hover {
        color: var(--text);
        border-color: var(--accent);
      }
      .raw-json {
        display: none;
        margin-top: 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px;
        font-family: var(--mono);
        font-size: 0.75rem;
        overflow-x: auto;
        max-height: 400px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-word;
        color: var(--muted);
      }
      .raw-json.active {
        display: block;
      }

      /* Dev tools (structured query) */
      .dev-tools {
        margin-top: 24px;
        border-top: 1px solid var(--border);
        padding-top: 16px;
      }
      .dev-tools summary {
        cursor: pointer;
        color: var(--muted);
        font-size: 0.85rem;
        font-weight: 500;
        user-select: none;
      }
      .dev-tools summary:hover {
        color: var(--text);
      }
      .dev-tools-body {
        margin-top: 12px;
      }
      .dev-tools label {
        display: block;
        color: var(--muted);
        font-size: 0.8rem;
        margin-bottom: 4px;
      }
      .dev-tools select,
      .dev-tools textarea {
        width: 100%;
        padding: 8px 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: var(--mono);
        font-size: 0.82rem;
        outline: none;
        margin-bottom: 12px;
      }
      .dev-tools textarea {
        height: 80px;
        resize: vertical;
      }
      .dev-tools select:focus,
      .dev-tools textarea:focus {
        border-color: var(--accent);
      }
      .dev-tools button {
        padding: 8px 16px;
        border: none;
        background: var(--surface);
        border: 1px solid var(--accent);
        color: var(--accent);
        border-radius: var(--radius);
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.15s;
      }
      .dev-tools button:hover {
        background: var(--accent);
        color: #fff;
      }

      /* Table scroll wrapper */
      .table-scroll {
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>nbatools</h1>
        <span class="version" id="version"></span>
      </header>

      <!-- Natural query input -->
      <form class="query-bar" id="query-form">
        <input
          type="text"
          id="query-input"
          placeholder="Type an NBA query…"
          autocomplete="off"
          autofocus
        />
        <button type="submit" id="submit-btn">Query</button>
      </form>

      <div class="samples" id="samples">
        <button type="button">Jokic last 10 games</button>
        <button type="button">Jokic vs Embiid 2024-25</button>
        <button type="button">top 10 scorers 2024-25</button>
        <button type="button">Celtics home vs away 2024-25</button>
        <button type="button">Luka 30+ point games</button>
        <button type="button">Lakers longest winning streak 2024-25</button>
        <button type="button">top team games by points 2024-25</button>
      </div>

      <!-- Loading -->
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>Running query…</div>
      </div>

      <!-- Error -->
      <div class="error-box" id="error-box">
        <div class="title">Error</div>
        <div id="error-msg"></div>
      </div>

      <!-- Result -->
      <div id="result-area">
        <!-- Envelope -->
        <div class="envelope" id="envelope"></div>

        <!-- Data sections -->
        <div id="sections"></div>

        <!-- Raw JSON toggle -->
        <div class="raw-toggle">
          <button type="button" class="toggle-btn" id="raw-toggle-btn">
            Show Raw JSON
          </button>
          <pre class="raw-json" id="raw-json"></pre>
        </div>
      </div>

      <!-- Dev tools: structured query -->
      <details class="dev-tools">
        <summary>Dev Tools — Structured Query</summary>
        <div class="dev-tools-body">
          <label for="route-select">Route</label>
          <select id="route-select">
            <option value="">Loading routes…</option>
          </select>

          <label for="kwargs-input">kwargs (JSON)</label>
          <textarea
            id="kwargs-input"
            placeholder='{"season": "2024-25", "stat": "pts", "limit": 10}'
          >
{}</textarea
          >

          <button type="button" id="structured-submit">
            Run Structured Query
          </button>
        </div>
      </details>
    </div>

    <script>
      (function () {
        "use strict";

        // --- DOM refs ---
        const queryForm = document.getElementById("query-form");
        const queryInput = document.getElementById("query-input");
        const submitBtn = document.getElementById("submit-btn");
        const loadingEl = document.getElementById("loading");
        const errorBox = document.getElementById("error-box");
        const errorMsg = document.getElementById("error-msg");
        const resultArea = document.getElementById("result-area");
        const envelopeEl = document.getElementById("envelope");
        const sectionsEl = document.getElementById("sections");
        const rawToggleBtn = document.getElementById("raw-toggle-btn");
        const rawJsonEl = document.getElementById("raw-json");
        const versionEl = document.getElementById("version");
        const routeSelect = document.getElementById("route-select");
        const kwargsInput = document.getElementById("kwargs-input");
        const structuredSubmit = document.getElementById("structured-submit");
        const samplesEl = document.getElementById("samples");

        // --- API base (same origin) ---
        const API = window.location.origin;

        // --- Init ---
        fetchHealth();
        fetchRoutes();

        // --- Event listeners ---
        queryForm.addEventListener("submit", function (e) {
          e.preventDefault();
          const q = queryInput.value.trim();
          if (q) runNaturalQuery(q);
        });

        samplesEl.addEventListener("click", function (e) {
          if (e.target.tagName === "BUTTON") {
            queryInput.value = e.target.textContent;
            runNaturalQuery(e.target.textContent);
          }
        });

        rawToggleBtn.addEventListener("click", function () {
          rawJsonEl.classList.toggle("active");
          rawToggleBtn.textContent = rawJsonEl.classList.contains("active")
            ? "Hide Raw JSON"
            : "Show Raw JSON";
        });

        structuredSubmit.addEventListener("click", function () {
          const route = routeSelect.value;
          if (!route) return;
          let kwargs = {};
          try {
            kwargs = JSON.parse(kwargsInput.value || "{}");
          } catch (err) {
            showError("Invalid JSON in kwargs: " + err.message);
            return;
          }
          runStructuredQuery(route, kwargs);
        });

        // --- Fetch helpers ---
        async function fetchHealth() {
          try {
            const res = await fetch(API + "/health");
            const data = await res.json();
            versionEl.textContent = "v" + data.version;
          } catch (e) {
            versionEl.textContent = "(API offline)";
          }
        }

        async function fetchRoutes() {
          try {
            const res = await fetch(API + "/routes");
            const data = await res.json();
            routeSelect.innerHTML =
              '<option value="">— select route —</option>';
            data.routes.forEach(function (r) {
              const opt = document.createElement("option");
              opt.value = r;
              opt.textContent = r;
              routeSelect.appendChild(opt);
            });
          } catch (e) {
            routeSelect.innerHTML =
              '<option value="">Failed to load routes</option>';
          }
        }

        // --- Query execution ---
        async function runNaturalQuery(query) {
          setLoading(true);
          clearResults();
          try {
            const res = await fetch(API + "/query", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ query: query }),
            });
            const data = await res.json();
            if (!res.ok && data.error) {
              showError(data.detail || data.error);
              return;
            }
            renderResponse(data);
          } catch (err) {
            showError("Request failed: " + err.message);
          } finally {
            setLoading(false);
          }
        }

        async function runStructuredQuery(route, kwargs) {
          setLoading(true);
          clearResults();
          try {
            const res = await fetch(API + "/structured-query", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ route: route, kwargs: kwargs }),
            });
            const data = await res.json();
            if (!res.ok && data.error) {
              showError(data.detail || data.error);
              return;
            }
            renderResponse(data);
          } catch (err) {
            showError("Request failed: " + err.message);
          } finally {
            setLoading(false);
          }
        }

        // --- UI state helpers ---
        function setLoading(on) {
          loadingEl.classList.toggle("active", on);
          submitBtn.disabled = on;
        }

        function clearResults() {
          errorBox.classList.remove("active");
          resultArea.classList.remove("active");
          rawJsonEl.classList.remove("active");
          rawToggleBtn.textContent = "Show Raw JSON";
          envelopeEl.innerHTML = "";
          sectionsEl.innerHTML = "";
          rawJsonEl.textContent = "";
        }

        function showError(msg) {
          errorMsg.textContent = msg;
          errorBox.classList.add("active");
        }

        // --- Response rendering ---
        function renderResponse(data) {
          resultArea.classList.add("active");
          renderEnvelope(data);
          renderSections(data);
          rawJsonEl.textContent = JSON.stringify(data, null, 2);
        }

        function renderEnvelope(data) {
          const statusClass =
            data.result_status === "ok"
              ? "status-ok"
              : data.result_status === "no_result"
                ? "status-warn"
                : "status-err";

          let html = "";
          html += envelopeRow("Query", escHtml(data.query));
          html += envelopeRow(
            "Status",
            '<span class="' +
              statusClass +
              '">' +
              escHtml(data.result_status) +
              "</span>" +
              (data.result_reason
                ? ' <span style="color:var(--muted)">(' +
                  escHtml(data.result_reason) +
                  ")</span>"
                : ""),
          );
          if (data.route) {
            html += envelopeRow(
              "Route",
              '<span class="pill">' + escHtml(data.route) + "</span>",
            );
          }
          if (data.current_through) {
            html += envelopeRow("Data through", escHtml(data.current_through));
          }
          if (data.result && data.result.metadata) {
            const md = data.result.metadata;
            const parts = [];
            if (md.player) parts.push(md.player);
            if (md.team) parts.push(md.team);
            if (md.season) parts.push(md.season);
            if (md.players && md.players.length)
              parts.push(md.players.join(", "));
            if (md.teams && md.teams.length) parts.push(md.teams.join(", "));
            if (parts.length) {
              html += envelopeRow("Context", escHtml(parts.join(" · ")));
            }
          }
          if (data.notes && data.notes.length) {
            html += envelopeRow("Notes", renderList(data.notes, "notes-list"));
          }
          if (data.caveats && data.caveats.length) {
            html += envelopeRow(
              "Caveats",
              renderList(data.caveats, "notes-list caveats-list"),
            );
          }

          envelopeEl.innerHTML = html;
        }

        function envelopeRow(label, valueHtml) {
          return (
            '<div class="envelope-row">' +
            '<span class="envelope-label">' +
            escHtml(label) +
            "</span>" +
            '<span class="envelope-value">' +
            valueHtml +
            "</span>" +
            "</div>"
          );
        }

        function renderList(items, cls) {
          return (
            '<ul class="' +
            cls +
            '">' +
            items
              .map(function (n) {
                return "<li>" + escHtml(n) + "</li>";
              })
              .join("") +
            "</ul>"
          );
        }

        // --- Section rendering ---
        function renderSections(data) {
          const result = data.result;
          if (!result || !result.sections) {
            if (
              data.result_status === "no_result" ||
              data.result_status === "error"
            ) {
              sectionsEl.innerHTML =
                '<div class="no-result">' +
                escHtml(data.result_reason || "No matching data found.") +
                "</div>";
            }
            return;
          }

          const sections = result.sections;
          const queryClass = result.query_class || "";

          // Render sections in a sensible order based on query class
          const order = sectionOrder(queryClass, sections);

          order.forEach(function (key) {
            const rows = sections[key];
            if (!rows || !rows.length) return;

            const div = document.createElement("div");
            div.className = "section";

            const title = document.createElement("div");
            title.className = "section-title";
            title.textContent = sectionLabel(key, queryClass);
            div.appendChild(title);

            const wrapper = document.createElement("div");
            wrapper.className = "table-scroll";
            wrapper.appendChild(buildTable(rows, key, queryClass));
            div.appendChild(wrapper);

            sectionsEl.appendChild(div);
          });

          // If we rendered no sections at all, show a fallback
          if (!sectionsEl.children.length) {
            if (data.result_status !== "ok") {
              sectionsEl.innerHTML =
                '<div class="no-result">' +
                escHtml(data.result_reason || "No matching data found.") +
                "</div>";
            }
          }
        }

        function sectionOrder(queryClass, sections) {
          // Preferred display order by query class
          var preferred = {
            summary: ["summary", "by_season"],
            comparison: ["summary", "comparison"],
            split_summary: ["summary", "split_comparison"],
            finder: ["finder"],
            leaderboard: ["leaderboard"],
            streak: ["streak"],
          };
          var order = preferred[queryClass] || [];
          // Append any sections not already in the preferred list
          Object.keys(sections).forEach(function (k) {
            if (order.indexOf(k) === -1) order.push(k);
          });
          return order;
        }

        function sectionLabel(key, queryClass) {
          var labels = {
            summary: "Summary",
            by_season: "By Season",
            comparison: "Comparison",
            split_comparison: "Split Comparison",
            finder: "Matching Games",
            leaderboard: "Leaderboard",
            streak: "Streaks",
          };
          return labels[key] || key.replace(/_/g, " ");
        }

        // --- Table builder ---
        function buildTable(rows, sectionKey, queryClass) {
          var table = document.createElement("table");
          table.className = "data-table";

          if (!rows.length) return table;

          // Determine columns - use the keys from the first row
          var cols = Object.keys(rows[0]);

          // Build header
          var thead = document.createElement("thead");
          var headerRow = document.createElement("tr");
          cols.forEach(function (col) {
            var th = document.createElement("th");
            th.textContent = formatColHeader(col);
            if (isNumericCol(col, rows)) th.className = "num";
            headerRow.appendChild(th);
          });
          thead.appendChild(headerRow);
          table.appendChild(thead);

          // Build body
          var tbody = document.createElement("tbody");
          rows.forEach(function (row) {
            var tr = document.createElement("tr");
            cols.forEach(function (col) {
              var td = document.createElement("td");
              var val = row[col];
              td.textContent = formatValue(val, col);
              if (isNumericCol(col, rows)) td.className = "num";
              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          });
          table.appendChild(tbody);

          return table;
        }

        // --- Formatting helpers ---
        function formatColHeader(col) {
          // Keep short stat abbreviations as-is, uppercase
          if (col.length <= 5 && col === col.toUpperCase()) return col;
          // Otherwise, title-case with underscores replaced
          return col.replace(/_/g, " ").replace(/\b\w/g, function (c) {
            return c.toUpperCase();
          });
        }

        function formatValue(val, col) {
          if (val === null || val === undefined) return "—";
          if (typeof val === "number") {
            // Detect percentages
            if (
              col.toLowerCase().includes("pct") ||
              col.toLowerCase().endsWith("_pct") ||
              col.toLowerCase() === "fg_pct" ||
              col.toLowerCase() === "ft_pct" ||
              col.toLowerCase() === "fg3_pct"
            ) {
              // If stored as 0-1 ratio, display as percentage
              if (val >= 0 && val <= 1 && col.toLowerCase().includes("pct")) {
                return (val * 100).toFixed(1) + "%";
              }
              return val.toFixed(1) + "%";
            }
            // Integer-like values
            if (Number.isInteger(val) || Math.abs(val) >= 100)
              return val.toLocaleString();
            // Decimal stats
            return val % 1 === 0 ? val.toString() : val.toFixed(1);
          }
          return String(val);
        }

        function isNumericCol(col, rows) {
          // Check first non-null value
          for (var i = 0; i < Math.min(rows.length, 5); i++) {
            var v = rows[i][col];
            if (v !== null && v !== undefined) {
              return typeof v === "number";
            }
          }
          return false;
        }

        function escHtml(str) {
          var div = document.createElement("div");
          div.appendChild(document.createTextNode(str || ""));
          return div.innerHTML;
        }
      })();
    </script>
  </body>
</html>
